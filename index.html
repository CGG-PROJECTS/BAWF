    // ==================== FIXED WORD CLOUD FUNCTION ====================
    function generateWordCloud() {
      const statusEl = document.getElementById('cloudStatus');
      statusEl.style.color = '#6b7280';
      statusEl.textContent = 'Processing data...';

      let input = document.getElementById('wordInput').value.trim();
      if (!input) {
        statusEl.style.color = 'red';
        statusEl.textContent = 'Please paste some data first!';
        return;
      }

      const list = [];

      input.split('\n').forEach(line => {
        let cleaned = line.trim();
        if (!cleaned) return;

        // Improved splitting: handles tabs, multiple spaces, commas, or even Excel paste
        let parts = cleaned.split(/\t+|\s{2,}|,+/).map(p => p.trim()).filter(p => p !== '');

        if (parts.length >= 2) {
          const word = parts[0];
          // Try to find a number in the remaining parts (in case there are extra columns)
          let freqStr = parts.find(p => !isNaN(parseFloat(p)));
          const freq = parseFloat(freqStr);

          if (word && !isNaN(freq) && freq > 0) {
            list.push([word, freq]);
          }
        }
      });

      if (list.length === 0) {
        statusEl.style.color = 'red';
        statusEl.textContent = 'Could not find valid word + frequency pairs. Try pasting just two columns.';
        return;
      }

      // Sort by frequency descending
      list.sort((a, b) => b[1] - a[1]);

      const canvas = document.getElementById('wordCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      statusEl.textContent = 'Generating cloud...';

      // Small delay + check if library loaded
      setTimeout(() => {
        if (typeof WordCloud !== 'function') {
          statusEl.style.color = 'red';
          statusEl.textContent = 'Word cloud library failed to load. Please refresh the page.';
          return;
        }

        WordCloud(canvas, {
          list: list,
          gridSize: 10,
          weightFactor: 24,
          fontFamily: 'Segoe UI, Arial, sans-serif',
          color: 'random-dark',
          rotateRatio: 0.25,
          backgroundColor: '#ffffff',
          minSize: 10,
          shrinkToFit: true,
          drawOutOfBound: false
        });

        statusEl.style.color = '#15803d';
        statusEl.textContent = `Success! ${list.length} words generated.`;
      }, 100);
    }

    // Auto-fill example when opening the tab
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.textContent.includes('Word Cloud')) {
          setTimeout(() => {
            const ta = document.getElementById('wordInput');
            if (!ta.value.trim()) {
              ta.value = `distractor 2.56
extractions 2.54
subcontractor 2.49
extractor 2.48
abstracting 2.47
abstractly 2.42
contractile 2.41
detracted 2.39
attractor 2.35
retracting 2.32
subcontracted 2.30`;
            }
          }, 300);
        }
      });
    });
  </script>
