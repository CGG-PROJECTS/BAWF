<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BAWF Morphological Database</title>
 
  <!-- WordCloud2.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2/1.2.3/wordcloud2.min.js" defer></script>
 
  <style>
    /* ... (keep all your existing styles from the previous version) ... */
    #wordInput {
      width: 90%; max-width: 900px; height: 220px;
      padding: 16px; font-family: monospace; font-size: 1rem;
      border: 2px solid #d1d5db; border-radius: 10px; resize: vertical;
      background: #f9fafb;
    }
    #generateBtn {
      margin-top: 16px; padding: 14px 40px; font-size: 1.1rem; font-weight: 600;
      background: #1d4ed8; color: white; border: none; border-radius: 10px; cursor: pointer;
    }
    #wordCanvas {
      display: block; margin: 32px auto; max-width: 100%; border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08); background: white;
    }
  </style>
</head>
<body>
  <!-- ... (keep your header, loading note, key button, visual banner, tabs, and the other three tabs exactly as before) ... -->

  <!-- ==================== WORD CLOUD TAB (Fixed) ==================== -->
  <div id="wordcloud" class="tab-content">
    <div style="max-width:900px; margin:0 auto; text-align:center;">
      <p><strong>Instructions:</strong> Paste two columns (Word + Frequency) below and click the button.</p>
      <textarea id="wordInput" placeholder="Paste your data here...&#10;Example:&#10;attract 4.27&#10;attracted 4.24&#10;extract 4.04"></textarea>
      <br><br>
      <button id="generateBtn" onclick="generateWordCloud()">Generate Word Cloud</button>
      <p id="cloudStatus" style="margin-top:10px; color:#6b7280; font-size:0.95rem;"></p>
    </div>
    <canvas id="wordCanvas" width="1000" height="700"></canvas>
  </div>

  <!-- ... rest of your footer ... -->

  <script>
    // Your existing openTab(), showColumnKey(), closeModal() functions stay the same

    function generateWordCloud() {
      const status = document.getElementById('cloudStatus');
      status.textContent = "Generating...";

      const input = document.getElementById('wordInput').value.trim();
      if (!input) {
        status.textContent = "Please paste some data first!";
        return;
      }

      const list = [];
      const lines = input.split('\n');

      lines.forEach(line => {
        const cleaned = line.trim();
        if (!cleaned) return;
        // Split on tab, multiple spaces, or comma
        const parts = cleaned.split(/\t|\s{2,}|,/).map(p => p.trim());
        if (parts.length >= 2) {
          const word = parts[0];
          const freq = parseFloat(parts[1]);
          if (word && !isNaN(freq) && freq > 0) {
            list.push([word, freq]);
          }
        }
      });

      if (list.length === 0) {
        status.textContent = "No valid word-frequency pairs found. Check your format.";
        return;
      }

      // Sort by frequency (largest first)
      list.sort((a, b) => b[1] - a[1]);

      const canvas = document.getElementById('wordCanvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Small delay to ensure library is loaded
      setTimeout(() => {
        if (typeof WordCloud === "function") {
          WordCloud(canvas, {
            list: list,
            gridSize: 12,
            weightFactor: 22,
            fontFamily: 'Segoe UI, Arial, sans-serif',
            color: 'random-dark',
            rotateRatio: 0.3,
            backgroundColor: '#ffffff',
            minSize: 12,
            shrinkToFit: true
          });
          status.textContent = "Word cloud generated!";
        } else {
          status.textContent = "Word cloud library not loaded yet. Please refresh the page and try again.";
        }
      }, 300);
    }

    // Optional: Auto-fill a nice example when user opens the Word Cloud tab
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.textContent.includes('Word Cloud')) {
          setTimeout(() => {
            const textarea = document.getElementById('wordInput');
            if (!textarea.value.trim()) {
              textarea.value = `attract 4.27
attracted 4.24
extract 4.04
attraction 4.04
distracted 3.99
extracted 3.93
extraction 3.90
distraction 3.88
contractors 3.86
attracting 3.81
contracted 3.78
traction 3.78
contractor 3.76
attractions 3.75
distract 3.71
contractual 3.70
tract 3.69
contracting 3.62
attracts 3.62
tractor 3.62
contraction 3.58
abstraction 3.56
extracts 3.52
distracting 3.51`;
            }
          }, 400);
        }
      });
    });
  </script>
</body>
</html>
